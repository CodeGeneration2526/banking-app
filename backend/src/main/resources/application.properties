spring.application.name=bankingapp

springdoc.swagger-ui.path=/swagger-ui.html

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:mem:bankingapp
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# Keep pagination param name consistent with the rest of the controllers
# We should remove  this asap though by renaming pageSize in all controllers to just use spring's 'Size'
spring.data.web.pageable.size-parameter=pageSize

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000

logging.level.web=DEBUG